# Copy-paste template 1 of 2: the producer. Drop this file in as-is — it's a standalone
# workflow and touches nothing you already have. It runs waiver-stamp as unprivileged
# pull_request CI, publishing the `waiver-stamp` check + report artifact the reviewer
# consumes. The hardened shape lives in the pinned reusable workflow, not here.
#
# See docs/auto-approval-setup.md for the full checklist this template is step 1 of.
name: waiver-stamp-ci

on:
  pull_request:

permissions:
  contents: read

jobs:
  waiver-stamp:
    # Immutable tag (we keep `v*` tags immutable via a repo ruleset). If your policy is
    # hash-pin-only, swap the ref for the SHA it points at:
    #   gh api repos/jsalvata/waiver-stamp/commits/v1.22.1 --jq .sha
    uses: jsalvata/waiver-stamp/.github/workflows/reusable-ci.yml@v1.22.1
