# Copy-paste template: the adopter's producer workflow.
#
# This job runs waiver-stamp as ordinary, unprivileged pull_request CI. It computes the
# verdict over the PR range and publishes it as a named check ("waiver-stamp") plus a
# run artifact ("waiver-stamp-report") that the privileged reviewer caller (see
# waiver-stamp-review.yml in this directory) later consumes. It never needs a write
# token — forks get the default read-only GITHUB_TOKEN, which is all this job uses.
#
# See docs/auto-approval-setup.md for the full checklist this template is step 1 of.

name: CI  # <-- EDIT: your existing CI workflow name. The reviewer caller's `workflows:`
          #     list (in waiver-stamp-review.yml) must name this workflow exactly.

on:
  pull_request:

permissions:
  contents: read

jobs:
  # ── Your existing CI job(s) — lint / typecheck / test / build / … — stay here, unchanged.
  #    Shown only so it's clear that `waiver-stamp` (below) is a sibling job at this same
  #    `jobs:` level: keep your own jobs, just add `waiver-stamp` alongside them. waiver-stamp
  #    needs none of your deps installed — it runs in its own npx sandbox.
  build:                     # <-- EDIT: your existing job(s); replace with your real pipeline
    runs-on: ubuntu-latest
    steps:
      - run: "..."           # <-- your lint / typecheck / test / build steps

  waiver-stamp:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required: waiver-stamp walks the full base..head commit range
          persist-credentials: false

      - name: waiver-stamp
        # Pin to a full commit SHA of jsalvata/waiver-stamp, not a branch or tag. This job is
        # unprivileged (read-only token on forks), but do not read that as "the pin doesn't
        # matter": the verdict this job publishes is what the privileged reviewer consumes to
        # decide APPROVE. The reviewer re-derives its own guards (G1/G2) from git data, so a
        # bad tool cannot touch `.github/**` or sneak a dependency bump past it — but the core
        # "is this really a mechanical refactor" judgment is this tool's, so pin it.
        #
        # The `v*` tags are immutable (enforced by a repo ruleset), so this tag pin cannot be
        # force-moved under you. Paste it as-is. If your policy is hash-pin-only (zizmor's
        # default `unpinned-uses`, say), swap in the SHA this tag points at instead:
        #   gh api repos/jsalvata/waiver-stamp/commits/v1.11.2 --jq .sha
        uses: jsalvata/waiver-stamp/.github/actions/waiver-stamp@v1.11.2
        # No `with:` — the action takes no inputs. The CLI version is not selectable: it is
        # always the release that ships at the ref you pinned above, so that one pin covers
        # BOTH this action's code and the tool that computes the verdict. To change the tool,
        # move the ref.
