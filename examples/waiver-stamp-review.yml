# Copy-paste template 2 of 2: the PRIVILEGED reviewer. This caller holds a
# pull-requests: write token — the credential that removes human review by posting an
# APPROVE — but it stays this short because the security-load-bearing shape (the pwn-request
# defense: check out YOUR default branch, never the PR head; bring the head in only as git
# data) lives in the pinned reusable workflow it calls, versioned and unforkable. You only
# edit one thing: the `workflows:` list.
#
# See docs/auto-approval-setup.md for the full checklist, and the reusable workflow's header
# (jsalvata/waiver-stamp .github/workflows/reusable-review.yml) for the threat model.
name: waiver-stamp-review

on:
  workflow_run:
    workflows: [CI, waiver-stamp-ci]  # <-- EDIT: name(s) of YOUR CI workflow(s) that produce
                                      #     your required checks, plus waiver-stamp-ci. Must
                                      #     match each workflow's `name:` exactly.
    types: [completed]

# The caller's token is the ceiling: a reusable workflow can only downgrade it, never elevate.
# GitHub's recommended default is read-only, so grant here exactly what the reviewer needs —
# without this block the reusable reviewer's pull-requests: write is capped and its APPROVE
# never posts.
permissions:
  pull-requests: write
  checks: read
  contents: read
  actions: read

jobs:
  review:
    # Immutable tag (we keep `v*` tags immutable via a repo ruleset). If your policy is
    # hash-pin-only, swap the ref for the SHA it points at:
    #   gh api repos/jsalvata/waiver-stamp/commits/v1.22.1 --jq .sha
    uses: jsalvata/waiver-stamp/.github/workflows/reusable-review.yml@v1.22.1
    # App-token path (step 8) only. Drop this block for the no-App path.
    secrets:
      app_id: ${{ secrets.WAIVER_STAMP_APP_ID }}
      app_private_key: ${{ secrets.WAIVER_STAMP_APP_PRIVATE_KEY }}
    # with:
    #   ci-checks: |    # <-- optional override for the no-App path (empty ⇒ autodiscover).
    #     build         #     CHECK-RUN names, not job ids — one per matrix leg.
