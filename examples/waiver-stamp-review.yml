# Copy-paste template: the adopter's PRIVILEGED reviewer caller.
#
# This workflow holds a pull-requests: write token — the credential that removes human
# review by posting an APPROVE. Its integrity is the whole system's integrity, so this
# file reproduces a specific, security-reviewed shape. **Read this comment block before
# editing anything beyond the two marked EDIT points.**
#
# WHY THIS SHAPE (the pwn-request defense, design doc §3.4):
#
#   1. `uses: jsalvata/waiver-stamp/.github/actions/waiver-stamp-review@v1.15.0` is pinned to
#      an immutable ref of an EXTERNAL repo (the `v*` tags are protected against being moved
#      or deleted by a repo ruleset; a full commit SHA is the hash-pinned alternative). That
#      makes the action's code trusted — a PR against YOUR repo cannot alter what this job
#      runs, no matter what it changes in its own branch. (Contrast: this repo's own dogfood
#      uses a local `uses: ./…` action and instead checks out its OWN default branch below to
#      get the same trusted-code property — you don't need that trick because your `uses:` ref
#      already points at code outside your repo entirely.) What you must NOT do is pin a
#      mutable ref — a branch, or `@main` — which would let us (or anyone who compromised us)
#      change the code holding your write token without you re-pinning.
#   2. The checkout below targets `${{ github.event.repository.default_branch }}` — YOUR
#      default branch — never the PR head. `persist-credentials: false` means even that
#      checkout can't leak a push-capable credential.
#   3. The PR head commit is brought in with a separate `git fetch`, purely as DATA
#      (objects in the git store) — never checked out, never executed. The reviewer
#      action reads those commits via git plumbing (diffs, `git show`) to run its trust
#      guards (G1: no `.github/**` edit anywhere in the range; G2: any manifest/lockfile
#      change is confined to an honest, allowlisted, up-moving semver bump) — all git
#      DATA reads, zero code execution from the PR.
#
#   Together: the only code this job ever executes is (a) the pinned external action and
#   (b) your own default-branch git history. The PR's contents are never anything more
#   than bytes on disk that get diffed. Getting this backwards — e.g. checking out
#   `head_sha` instead of your default branch — reintroduces the exact "pwn request"
#   vulnerability class GitHub Actions is famous for: a PR author's code running with a
#   write token that can approve their own PR.
#
# See docs/auto-approval-setup.md for the full checklist this template is step 2 of.

name: waiver-stamp-review

on:
  workflow_run:
    workflows: [CI]  # <-- EDIT: name(s) of YOUR CI workflow(s) that produce the
                      #     backstop checks named in `ci-checks` below — this must match
                      #     the `name:` at the top of your waiver-stamp-ci.yml (or
                      #     whichever workflow(s) run your required checks).
    types: [completed]

permissions:
  pull-requests: write
  checks: read
  contents: read
  actions: read

jobs:
  review:
    runs-on: ubuntu-latest
    concurrency:
      group: waiver-stamp-review-${{ github.event.workflow_run.head_branch }}
      cancel-in-progress: false
    steps:
      # SECURITY (pwn-request): this job has a write token. It must run the TRUSTED
      # default-branch code, NEVER anything derived from the PR head. Checking out your
      # default branch here isn't strictly required when `uses:` is pinned to an
      # external SHA (unlike this repo's own local `uses: ./…` dogfood, which needs the
      # checkout to get trusted code at all) — but it costs nothing, keeps this template
      # identical to the hardened original, and means a future edit that swaps the
      # `uses:` back to a local path doesn't silently reopen the hole.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch the PR head commits (data for G1/G2 — never executed)
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: git fetch --no-tags --force origin "$HEAD_SHA"

      # Immutable tag (see the SECURITY header). Paste as-is; or, if your policy is
      # hash-pin-only, swap in the SHA it points at:
      #   gh api repos/jsalvata/waiver-stamp/commits/v1.15.0 --jq .sha
      - uses: jsalvata/waiver-stamp/.github/actions/waiver-stamp-review@v1.15.0
        with:
          # These are CHECK-RUN names that must be green on the head SHA — NOT workflow job ids.
          # The two differ whenever a job sets `name:` or uses a matrix:
          #       jobs.build             -> "build"
          #       jobs.test (name: Unit) -> "Unit"
          #       matrix `integration` over node 9.12.0 / 10.0.0
          #                              -> "integration (9.12.0)", "integration (10.0.0)"
          # One entry per matrix leg — a bare `integration` matches nothing and the reviewer then
          # waits forever (fail-closed). List only checks that run on PRs, too — a push-only job
          # like `release` never reports on the head SHA, so it hangs the reviewer the same way.
          # Read the real names off a recent PR of your own:
          #       gh api repos/OWNER/REPO/commits/<head-sha>/check-runs --jq '.check_runs[].name'
          # Do NOT list "waiver-stamp" itself — its verdict IS the artifact this action trusts.
          ci-checks: |  # <-- EDIT: replace `build` below with your check-run name(s), one per line
            build
          lockfile-honesty-checks: ''  # <-- EDIT (optional): if you have a separate
                             #     lockfile-honesty check (e.g. lockfile-firewall) wired
                             #     in as a required check, list its name(s) here to
                             #     silence the "assumes the lockfile is honest" warning
                             #     on APPROVE reviews. Leave empty if you don't have one.
