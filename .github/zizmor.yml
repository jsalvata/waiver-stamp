rules:
  unpinned-uses:
    config:
      policies:
        # This repo tag-pins third-party actions (see ci.yml/release.yml's `@v4`/`@v2`
        # etc.) rather than SHA-pinning; zizmor's default policy requires hash-pin for
        # everything. Accept the existing convention repo-wide instead of unilaterally
        # SHA-pinning every workflow for this task.
        "*": ref-pin

  dangerous-triggers:
    ignore:
      # waiver-stamp-review.yml's `workflow_run` is the deliberate pwn-request mitigation
      # (see the file's own SECURITY comment): the privileged job checks out the TRUSTED
      # default-branch action code and only ever treats the PR head as inert data (fetched,
      # never executed/uses'd). That checkout-default-branch pattern is exactly zizmor's
      # own recommended mitigation for workflow_run, so this is a false positive here.
      - waiver-stamp-review.yml
      # lockfile-assay.yml's `pull_request_target` is the anchor: it runs the base branch's
      # trusted workflow definition, checks out the base (never the head), and fetches the
      # head only as inert git data (never executed/uses'd). App secrets live on a
      # branch-restricted environment. Same base-checkout mitigation as above.
      - lockfile-assay.yml

  adhoc-packages:
    ignore:
      # release.yml's `npm install -g npm@latest` is a deliberate, unavoidable bootstrap:
      # OIDC trusted publishing (semantic-release v25 / @semantic-release/npm v13) requires
      # npm >= 11.5.1, but the setup-node Node 22 toolchain ships npm 10.x. Nothing in a
      # lockfile can upgrade the global npm that runs the publish, so the ad-hoc install of
      # npm itself (from the official registry) is intentional here — the step already
      # carries an inline comment saying as much. Audit added in zizmor v1.26.
      - release.yml

  artipacked:
    ignore:
      # lockfile-assay.yml has no artifact-upload step, so checkout's persisted credential
      # never leaves the runner. `persist-credentials: false` is not an option here: the
      # job fetches the PR head (`git fetch origin pull/<n>/head`) over the same origin
      # remote right after checkout, which needs those credentials.
      - lockfile-assay.yml
