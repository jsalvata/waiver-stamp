name: waiver-stamp
description: Run waiver stamp over the PR range, publish a report artifact, and gate on the verdict.
runs:
  using: composite
  steps:
    - id: stamp
      env:
        BASE: ${{ github.event.pull_request.base.sha }}
        HEAD: ${{ github.event.pull_request.head.sha }}
      shell: bash
      run: |
        set -euo pipefail
        # Run the CLI release that ships at this action's pinned ref: GitHub materialises the
        # repo here, so its package.json names the version matching this code. That makes
        # `uses: …@<ref>` pin the tool that computes the verdict, not just this script.
        WAIVER_VERSION="$(node -p "require(process.argv[1]).version" "$GITHUB_ACTION_PATH/../../../package.json")"
        # Install that release into an isolated prefix and run it by absolute path. Resolving the
        # CLI by bare package name would instead pick up a local package of the same name when
        # this action runs inside a checkout of this repo (the self-test job) — where the bin is
        # unbuilt, so newer npm exits 127 — and never guarantees the pinned version elsewhere.
        TOOLHOME="$(mktemp -d)"
        npm install --prefix "$TOOLHOME" --no-audit --no-fund "waiver-stamp@$WAIVER_VERSION" >/dev/null
        WAIVER="$TOOLHOME/node_modules/.bin/waiver"
        VER="$("$WAIVER" --version)"
        set +e
        "$WAIVER" stamp --base "$BASE" --head "$HEAD" --json > report.raw.json
        CODE=$?
        set -e
        # Wrap with toolVersion; the report already carries verdict/base/head (Task 1).
        node -e "const r=require('./report.raw.json');process.stdout.write(JSON.stringify({...r,toolVersion:'$VER'}))" > waiver-stamp-report.json
        {
          echo "### waiver-stamp"
          node -e "const r=require('./waiver-stamp-report.json');console.log('Verdict: **'+r.verdict+'**  (',r.commits.length,'commits )')"
        } >> "$GITHUB_STEP_SUMMARY"
        echo "verdict=$(node -e "process.stdout.write(require('./waiver-stamp-report.json').verdict)")" >> "$GITHUB_OUTPUT"
    - if: always()
      uses: actions/upload-artifact@v4
      with:
        name: waiver-stamp-report
        path: waiver-stamp-report.json
        retention-days: 3
    - if: steps.stamp.outputs.verdict == 'REQUEST_CHANGES'
      shell: bash
      run: 'echo "waiver claim failed — see the job summary"; exit 1'
