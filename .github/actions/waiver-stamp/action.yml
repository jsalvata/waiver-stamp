name: waiver-stamp
description: Run waiver stamp over the PR range, publish a report artifact, and gate on the verdict.
inputs:
  waiver-version:
    description: >-
      Version of the waiver-stamp CLI to run. Empty (the default) means "the version that
      ships at this action's own pinned ref", so pinning `uses:` to a SHA also pins the tool
      that computes the verdict. Pass an explicit `x.y.z` — or `latest` to float — to override.
    required: false
    default: ''
runs:
  using: composite
  steps:
    - id: stamp
      env:
        BASE: ${{ github.event.pull_request.base.sha }}
        HEAD: ${{ github.event.pull_request.head.sha }}
        WAIVER_VERSION: ${{ inputs.waiver-version }}
      shell: bash
      run: |
        set -euo pipefail
        # Resolve the default from this action's own checkout: GitHub materialises the whole
        # waiver-stamp repo at the pinned ref, so its package.json names the CLI release that
        # matches this very code. Without this, the SHA pin would cover only the shell script
        # below while `latest` silently floated the tool whose verdict removes human review.
        if [ -z "$WAIVER_VERSION" ]; then
          WAIVER_VERSION="$(node -p "require(process.argv[1]).version" "$GITHUB_ACTION_PATH/../../../package.json")"
        fi
        VER="$(npx --yes waiver-stamp@"$WAIVER_VERSION" --version)"
        set +e
        npx --yes waiver-stamp@"$WAIVER_VERSION" stamp --base "$BASE" --head "$HEAD" --json > report.raw.json
        CODE=$?
        set -e
        # Wrap with toolVersion; the report already carries verdict/base/head (Task 1).
        node -e "const r=require('./report.raw.json');process.stdout.write(JSON.stringify({...r,toolVersion:'$VER'}))" > waiver-stamp-report.json
        {
          echo "### waiver-stamp"
          node -e "const r=require('./waiver-stamp-report.json');console.log('Verdict: **'+r.verdict+'**  (',r.commits.length,'commits )')"
        } >> "$GITHUB_STEP_SUMMARY"
        echo "verdict=$(node -e "process.stdout.write(require('./waiver-stamp-report.json').verdict)")" >> "$GITHUB_OUTPUT"
    - if: always()
      uses: actions/upload-artifact@v4
      with:
        name: waiver-stamp-report
        path: waiver-stamp-report.json
        retention-days: 3
    - if: steps.stamp.outputs.verdict == 'REQUEST_CHANGES'
      shell: bash
      run: 'echo "waiver claim failed — see the job summary"; exit 1'
