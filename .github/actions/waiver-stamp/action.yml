name: waiver-stamp
description: Run waiver stamp over the PR range, publish a report artifact, and gate on the verdict.
# No inputs, deliberately. The CLI version is NOT selectable: it is always the release that ships
# at this action's own pinned ref, so `uses: …@<ref>` pins the tool that computes the verdict and
# not merely the shell script below. An input to override it could only ever be used to UNDO that
# — `latest` to float (the bug this repo shipped and then fixed), or an `x.y.z` mismatched with
# the action it runs beside, which nothing downstream detects (the reviewer records toolVersion
# but never checks it). The action and the CLI release in lockstep from this one repo, so every
# CLI version has a matching ref: to change the tool, move the ref.
runs:
  using: composite
  steps:
    - id: stamp
      env:
        BASE: ${{ github.event.pull_request.base.sha }}
        HEAD: ${{ github.event.pull_request.head.sha }}
      shell: bash
      run: |
        set -euo pipefail
        # GitHub materialises the whole waiver-stamp repo at the pinned ref, so its package.json
        # names the CLI release that matches this very code.
        WAIVER_VERSION="$(node -p "require(process.argv[1]).version" "$GITHUB_ACTION_PATH/../../../package.json")"
        VER="$(npx --yes waiver-stamp@"$WAIVER_VERSION" --version)"
        set +e
        npx --yes waiver-stamp@"$WAIVER_VERSION" stamp --base "$BASE" --head "$HEAD" --json > report.raw.json
        CODE=$?
        set -e
        # Wrap with toolVersion; the report already carries verdict/base/head (Task 1).
        node -e "const r=require('./report.raw.json');process.stdout.write(JSON.stringify({...r,toolVersion:'$VER'}))" > waiver-stamp-report.json
        {
          echo "### waiver-stamp"
          node -e "const r=require('./waiver-stamp-report.json');console.log('Verdict: **'+r.verdict+'**  (',r.commits.length,'commits )')"
        } >> "$GITHUB_STEP_SUMMARY"
        echo "verdict=$(node -e "process.stdout.write(require('./waiver-stamp-report.json').verdict)")" >> "$GITHUB_OUTPUT"
    - if: always()
      uses: actions/upload-artifact@v4
      with:
        name: waiver-stamp-report
        path: waiver-stamp-report.json
        retention-days: 3
    - if: steps.stamp.outputs.verdict == 'REQUEST_CHANGES'
      shell: bash
      run: 'echo "waiver claim failed — see the job summary"; exit 1'
