name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Release secrets live on this environment, restricted to main.
    environment: semantic-release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Push as the jsalvata-semantic-release App, which is on the main ruleset's bypass
      # list. The default GITHUB_TOKEN (github-actions[bot]) is not, so its `[skip ci]`
      # release commit can never satisfy the required lockfile-assay check and is rejected.
      - uses: actions/create-github-app-token@v1
        id: release-app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          # The release commit rewrites the version pins inside the reusable workflows
          # (.github/workflows/reusable-*.yml). GitHub refuses a push from an App that touches
          # .github/workflows/** without this permission — the App must also be granted it.
          permission-workflows: write

      - name: Release
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.release-app-token.outputs.token }}
