name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Release secrets live on this environment, restricted to main.
    environment: semantic-release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          # semantic-release v25 requires Node >= 22.14 (the published package
          # still supports Node >= 20 — see ci.yml, which tests on 20).
          node-version: 22
          cache: pnpm

      # OIDC trusted publishing (semantic-release v25 / @semantic-release/npm v13)
      # requires npm >= 11.5.1; Node 20 ships npm 10.x.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Push as the jsalvata-semantic-release App, which is on the main ruleset's bypass
      # list. The default GITHUB_TOKEN (github-actions[bot]) is not, so its `[skip ci]`
      # release commit can never satisfy the required lockfile-assay check and is rejected.
      - uses: actions/create-github-app-token@v1
        id: release-app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: Release
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.release-app-token.outputs.token }}
